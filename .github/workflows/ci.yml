name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r python/quant/requirements.txt
        pip install -r requirements-dev.txt

    - name: Code formatting check (Black)
      run: |
        black --check python/

    - name: Import sorting check (isort)
      run: |
        isort --check-only python/

    - name: Static analysis (Pylint)
      run: |
        pylint python/quant/ --rcfile=.pylintrc --exit-zero
      continue-on-error: true

    - name: Type checking (Mypy)
      run: |
        mypy python/quant/ --config-file=pyproject.toml
      continue-on-error: true

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=python/quant --cov-report=xml --cov-report=term
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort pylint mypy

    - name: Run Black
      run: black --check python/

    - name: Run isort
      run: isort --check-only python/

    - name: Run Pylint
      run: pylint python/quant/ --rcfile=.pylintrc --exit-zero
      continue-on-error: true

    - name: Run Mypy
      run: mypy python/quant/ --config-file=pyproject.toml
      continue-on-error: true
